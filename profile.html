<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile — Igloo</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Poppins', sans-serif; background: #faf7f2; color: #333; }

    /* Navbar — matches existing site */
    .navbar { background: #f8efd3; padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; }
    .nav-left { display: flex; align-items: center; gap: 20px; }
    .nav-left .logo { height: 55px; }
    .nav-left a { text-decoration: none; color: #333; font-weight: 600; font-size: 13px; letter-spacing: 1px; }
    .nav-right { display: flex; align-items: center; gap: 18px; }
    .nav-right a { color: #333; text-decoration: none; }
    .nav-right i { font-size: 18px; cursor: pointer; }

    /* Profile card */
    .profile-section { max-width: 500px; margin: 60px auto; padding: 0 20px; }

    .profile-card {
      background: white; border-radius: 14px; padding: 30px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.07); text-align: center;
    }

    .avatar {
      width: 90px; height: 90px; border-radius: 50%; background: #f8efd3;
      display: flex; align-items: center; justify-content: center;
      font-size: 36px; color: #5c4033; margin: 0 auto 16px;
    }

    .profile-card h1 { font-size: 24px; margin-bottom: 4px; }
    .profile-card .email { font-size: 14px; color: #888; margin-bottom: 20px; }

    .btn-edit {
      padding: 10px 28px; background: #5c4033; color: white; border: none;
      border-radius: 8px; font-family: 'Poppins', sans-serif; font-size: 14px;
      font-weight: 600; cursor: pointer; transition: 0.3s;
    }
    .btn-edit:hover { background: #3e2723; }

    /* Edit form */
    .edit-form {
      background: white; border-radius: 14px; padding: 30px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.07); display: none;
    }
    .edit-form.active { display: block; }

    .edit-form h2 { font-size: 20px; margin-bottom: 20px; }

    .form-group { margin-bottom: 16px; text-align: left; }
    .form-group label { display: block; font-size: 13px; font-weight: 600; color: #555; margin-bottom: 6px; }
    .form-group input {
      width: 100%; padding: 12px 14px; border: 2px solid #e0d8ce; border-radius: 8px;
      font-family: 'Poppins', sans-serif; font-size: 14px; outline: none;
    }
    .form-group input:focus { border-color: #5c4033; }

    .form-buttons { display: flex; gap: 10px; margin-top: 20px; }

    .btn-save {
      flex: 1; padding: 12px; background: #5c4033; color: white; border: none;
      border-radius: 8px; font-family: 'Poppins', sans-serif; font-size: 14px;
      font-weight: 600; cursor: pointer; transition: 0.3s;
    }
    .btn-save:hover { background: #3e2723; }

    .btn-cancel {
      flex: 1; padding: 12px; background: none; color: #888; border: 2px solid #e0d8ce;
      border-radius: 8px; font-family: 'Poppins', sans-serif; font-size: 14px;
      cursor: pointer; transition: 0.3s;
    }
    .btn-cancel:hover { border-color: #999; color: #555; }

    /* Success message */
    .success-msg {
      background: #e8f5e9; color: #2e7d32; padding: 10px 16px; border-radius: 8px;
      font-size: 13px; margin-top: 14px; display: none; text-align: center;
    }
    .success-msg.visible { display: block; }

    /* Not logged in */
    .login-prompt { text-align: center; padding: 20px 0; }
    .login-prompt a {
      color: #5c4033; font-weight: 600; text-decoration: none;
    }
    .login-prompt a:hover { text-decoration: underline; }
  </style>
</head>

<body>

  <!-- NAVBAR -->
  <nav class="navbar">
    <div class="nav-left">
      <a href="index.html"><img src="https://github.com/Navina-07/ic-bg/blob/main/logo2.png?raw=true" alt="Igloo Logo" class="logo"></a>
      <a href="fl.html">FLAVOURS</a>
      <a href="search.html">SEARCH</a>
      <a href="#">LOCATE US</a>
    </div>
    <div class="nav-right">
      <a href="search.html"><i class="fas fa-search"></i></a>
      <a href="profile.html"><i class="fas fa-user"></i></a>
      <a href="fl.html"><i class="fas fa-shopping-bag"></i></a>
    </div>
  </nav>

  <!-- PROFILE -->
  <div class="profile-section">

    <!-- View mode -->
    <div class="profile-card" id="view-mode">
      <div class="avatar" id="avatar-initial"></div>
      <h1 id="display-name"></h1>
      <p class="email" id="display-email"></p>
      <button class="btn-edit" id="btn-edit">Edit Profile</button>
      <div class="success-msg" id="success-msg">
        <i class="fas fa-check-circle"></i> Profile updated!
      </div>
    </div>

    <!-- Edit mode -->
    <div class="edit-form" id="edit-mode">
      <h2>Edit Profile</h2>

      <div class="form-group">
        <label for="input-name">Name</label>
        <input type="text" id="input-name">
      </div>

      <div class="form-group">
        <label for="input-email">Email</label>
        <input type="email" id="input-email">
      </div>

      <div class="form-buttons">
        <button class="btn-save" id="btn-save">Save</button>
        <button class="btn-cancel" id="btn-cancel">Cancel</button>
      </div>
    </div>

    <!-- Not logged in prompt -->
    <div class="login-prompt" id="login-prompt" style="display:none;">
      <p>You're not logged in. <a href="auth.html">Login or Sign up</a></p>
    </div>
  </div>

  <script>
    /* ── Props (data from parent / localStorage) ── */
    const props = {
      user: {
        username: localStorage.getItem('username') || '',
        email: localStorage.getItem('userEmail') || ''
      },
      isOwnProfile: true
    };

    /* ── Callback: onUpdateProfile(updatedData) ── */
    function onUpdateProfile(updatedData) {
      // Persist to localStorage
      localStorage.setItem('username', updatedData.username);
      localStorage.setItem('userEmail', updatedData.email);

      // Update props (simulates parent re-render)
      props.user.username = updatedData.username;
      props.user.email = updatedData.email;
    }

    /* ── State (useState equivalent) ── */
    let isEditing = false;
    let formName = '';
    let formEmail = '';

    /* ── Render ── */
    function render() {
      const viewMode = document.getElementById('view-mode');
      const editMode = document.getElementById('edit-mode');
      const loginPrompt = document.getElementById('login-prompt');

      // Check if user exists
      if (!props.user.username && !props.user.email) {
        viewMode.style.display = 'none';
        editMode.style.display = 'none';
        loginPrompt.style.display = 'block';
        return;
      }

      loginPrompt.style.display = 'none';

      if (isEditing) {
        viewMode.style.display = 'none';
        editMode.classList.add('active');
      } else {
        viewMode.style.display = 'block';
        editMode.classList.remove('active');

        // Update display
        document.getElementById('display-name').textContent = props.user.username;
        document.getElementById('display-email').textContent = props.user.email;
        document.getElementById('avatar-initial').textContent = props.user.username.charAt(0).toUpperCase();

        // Only show edit button if own profile
        document.getElementById('btn-edit').style.display = props.isOwnProfile ? 'inline-block' : 'none';
      }
    }

    /* ── Init ── */
    document.addEventListener('DOMContentLoaded', () => {

      // Initial render
      render();

      // Edit button
      document.getElementById('btn-edit').addEventListener('click', () => {
        // Set form state from props (don't modify props directly)
        formName = props.user.username;
        formEmail = props.user.email;

        document.getElementById('input-name').value = formName;
        document.getElementById('input-email').value = formEmail;

        isEditing = true;
        document.getElementById('success-msg').classList.remove('visible');
        render();
      });

      // Track form inputs (useState for form fields)
      document.getElementById('input-name').addEventListener('input', (e) => {
        formName = e.target.value;
      });

      document.getElementById('input-email').addEventListener('input', (e) => {
        formEmail = e.target.value;
      });

      // Save button
      document.getElementById('btn-save').addEventListener('click', () => {
        // Call the callback with updated data
        onUpdateProfile({
          username: formName,
          email: formEmail
        });

        isEditing = false;
        render();

        // Show success message
        document.getElementById('success-msg').classList.add('visible');
        setTimeout(() => {
          document.getElementById('success-msg').classList.remove('visible');
        }, 3000);
      });

      // Cancel button
      document.getElementById('btn-cancel').addEventListener('click', () => {
        isEditing = false;
        render();
      });
    });
  </script>
</body>
</html>
